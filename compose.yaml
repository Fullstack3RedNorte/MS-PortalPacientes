services:
  mysql:
    image: 'mysql:latest'
    container_name: ms-portal-mysql
    environment:
      MYSQL_DATABASE: mydatabase
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: verysecret
      MYSQL_USER: myuser
    ports:
      - '3306:3306'
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 5s
      retries: 10
      interval: 5s
    networks:
      - portal-network
    volumes:
      - mysql-data:/var/lib/mysql

  portal-app:
    container_name: ms-portal-app
    image: sh1r8/ms-portal-pacientes:latest
    ports:
      - '8088:8088'
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mydatabase
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - portal-network
    restart: on-failure

networks:
  portal-network:
    driver: bridge

volumes:
  mysql-data:
